<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>FauxSight</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background: #f5f7fb; color: #222; }
        .card { background: white; border-radius: 12px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); padding: 28px; width: min(600px, 100%); }
        h1 { margin-top: 0; }
        #preview { max-width: 100%; border-radius: 8px; margin-top: 16px; }
        .result { margin-top: 24px; font-size: 1.1rem; }
        .badge { display: inline-block; padding: 10px 16px; border-radius: 999px; background: #eef3ff; color: #1f3bb3; margin-top: 10px; }
        input[type=file] { margin-top: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>FauxSight</h1>
        <p>Upload an image and detect whether it looks AI-generated or real.</p>
        <input id="fileInput" type="file" accept="image/*" />
        <img id="preview" src="" alt="Image preview" hidden />
        <div class="result" id="result"></div>
    </div>

    <script type="text/javascript" src="eel.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const resultBox = document.getElementById('result');
        const preview = document.getElementById('preview');

        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async () => {
                const dataUrl = reader.result;
                preview.src = dataUrl;
                preview.hidden = false;
                resultBox.textContent = 'Analyzing...';
                try {
                    const result = await eel.predict_image(dataUrl)();
                    resultBox.innerHTML = `
                        <div class="badge">${result.label}</div>
                        <div>Confidence: ${result.confidence}</div>
                    `;
                } catch (error) {
                    resultBox.textContent = 'Prediction failed: ' + error;
                }
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>

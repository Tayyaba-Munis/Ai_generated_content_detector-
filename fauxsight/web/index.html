<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FauxSight | Noir Edition</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #ffffff;
        --secondary: #a1a1a1;
        --bg: #0a0a0a;
        --card-bg: #121212;
        --accent: #333333;
        --success: #ffffff; /* Real remains clean/white */
        --danger: #444444; /* AI-generated is deep gray */
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
        color: var(--primary);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--accent);
        border-radius: 4px;
        padding: 60px 40px;
        width: 100%;
        max-width: 650px;
        text-align: center;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: 3.5rem;
        font-style: italic;
        letter-spacing: -2px;
        margin: 0;
        text-transform: uppercase;
      }

      .subtitle {
        font-weight: 300;
        text-transform: uppercase;
        letter-spacing: 4px;
        font-size: 0.75rem;
        color: var(--secondary);
        margin-bottom: 40px;
      }

      /* Filmy Upload Zone */
      .drop-zone {
        border: 1px solid var(--accent);
        padding: 40px;
        cursor: pointer;
        transition: all 0.5s ease;
        background: transparent;
        position: relative;
      }

      .drop-zone:hover {
        background: var(--primary);
        color: var(--bg);
      }

      .drop-zone strong {
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 0.9rem;
      }

      /* Cinematic Preview Box */
      .preview-box {
        margin-top: 30px;
        background: #000;
        border: 1px solid var(--accent);
        display: none;
      }

      #preview-img,
      #preview-vid {
        max-width: 100%;
        filter: grayscale(100%);
        display: block;
        margin: 0 auto;
      }

      /* Result Area */
      .result-area {
        margin-top: 40px;
        padding: 30px;
        border-top: 1px solid var(--accent);
      }

      .badge {
        display: inline-block;
        padding: 6px 20px;
        border: 1px solid var(--primary);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 0.8rem; /* Slightly larger for short labels */
        margin-bottom: 15px;
      }

      /* Invert colors for AI */
      .badge-ai {
        background: var(--primary);
        color: var(--bg);
        border: 1px solid var(--primary);
      }
      /* Classic border for Real */
      .badge-real {
        background: transparent;
        color: var(--primary);
        border: 1px solid var(--primary);
      }

      .confidence-text {
        font-family: "Playfair Display", serif;
        font-size: 2.2rem;
        margin-bottom: 20px;
      }

      /* The Scanning Bar */
      .confidence-bar-wrapper {
        background: var(--accent);
        height: 2px;
        width: 100%;
        margin: 0 auto 20px auto;
        position: relative;
      }

      #bar-fill {
        height: 100%;
        background: var(--primary);
        width: 0%;
        transition: width 1.5s cubic-bezier(0.65, 0, 0.35, 1);
        box-shadow: 0 0 10px var(--primary);
      }

      /* Minimalist Loader */
      .loader {
        width: 20px;
        height: 20px;
        border: 2px solid var(--accent);
        border-top: 2px solid var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-right: 15px;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      .analysis-type {
        font-size: 0.65rem;
        color: var(--secondary);
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      #status-text {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--secondary);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>FauxSight</h1>
      <p class="subtitle">Authentication Laboratory</p>

      <div class="upload-container">
        <div class="drop-zone" onclick="selectAndProcess()">
          <strong>[ Load Sequence ]</strong>
          <div
            style="font-size: 0.6rem; color: var(--secondary); margin-top: 10px"
          >
            SUPPORTED FORMATS: RAW / MP4 / PNG
          </div>
        </div>
      </div>

      <div id="preview-container" class="preview-box">
        <img id="preview-img" alt="Frame Preview" style="display: none" />
        <div
          id="video-notice"
          style="
            display: none;
            padding: 20px;
            font-size: 0.8rem;
            letter-spacing: 1px;
          "
        >
          DECODING VIDEO:
          <span id="video-name" style="color: var(--primary)"></span>
        </div>
      </div>

      <div class="result-area" id="result-area">
        <div id="status-text">System Idle...</div>
      </div>
    </div>

    <script type="text/javascript" src="eel.js"></script>
    <script>
      const statusText = document.getElementById("status-text");
      const resultArea = document.getElementById("result-area");
      const previewImg = document.getElementById("preview-img");
      const videoNotice = document.getElementById("video-notice");
      const previewContainer = document.getElementById("preview-container");

      async function selectAndProcess() {
        // 1. Trigger the Python Tkinter File Picker
        const filePath = await eel.select_file()();
        if (!filePath) return; // User cancelled

        // 2. Prepare UI for analysis
        resetUI();
        statusText.innerHTML = `<div class="loader"></div> ANALYZING METADATA...`;

        try {
          // 3. Process the file via Python
          const result = await eel.process_file(filePath)();

          if (result.error) {
            statusText.innerHTML = `ERROR: ${result.error}`;
            return;
          }

          // 4. Handle Visual Previews
          displayPreview(filePath, result.type);

          // 5. Display Results with new labels
          renderResult(result);
        } catch (e) {
          statusText.innerHTML = "FATAL ERROR: " + e;
        }
      }

      function displayPreview(path, type) {
        previewContainer.style.display = "block";
        if (type === "image") {
          videoNotice.style.display = "none";
          previewImg.style.display = "block";
          // Placeholder icon is static, can't show AI/Real here easily
          previewImg.src =
            "https://img.icons8.com/ios-filled/100/ffffff/film-reel.png";
        } else {
          previewImg.style.display = "none";
          videoNotice.style.display = "block";
          document.getElementById("video-name").textContent = path
            .split("\\")
            .pop();
        }
      }

      function renderResult(res) {
        // Assume 'AI-Generated' is the label coming from main.py
        const isAI = res.label === "AI-Generated";
        const badgeClass = isAI ? "badge-ai" : "badge-real";

        // **NEW LABELS HERE**
        const labelText = isAI ? "AI" : "REAL";

        resultArea.innerHTML = `
          <div class="badge ${badgeClass}">${labelText}</div>
          <div class="confidence-text">${res.confidence} Integrity</div>
          <div class="confidence-bar-wrapper">
              <div id="bar-fill" style="width: ${res.confidence}"></div>
          </div>
          <div class="analysis-type">
            Scan Logic: ${res.type}
          </div>
        `;
      }

      function resetUI() {
        previewContainer.style.display = "none";
        previewImg.style.display = "none";
        videoNotice.style.display = "none";
        resultArea.innerHTML = '<div id="status-text"></div>';
      }

      // Initialize the model on startup
      window.onload = () => {
        eel.load_system()();
      };
    </script>
  </body>
</html>
